<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 120px;
      font-family: Georgia, serif;
      background: #191919;
    }

    .box {
      max-width: 700px;
      padding: 18px 22px;
      border-left: 3px solid #e0e0e0;
    }

    .quote {
      font-size: 16px;
      line-height: 1.6;
      color: #e0e0e0;
      font-style: italic;
    }

    .mark {
      font-size: 28px;
      line-height: 1;
      color: #e0e0e0;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="mark">“</div>
    <div id="quote" class="quote"></div>
  </div>

  <script>
    const quotes = [
      "La distancia emocional suele disfrazarse de prudencia.",
      "El corazón no se fortalece evitando el impacto, sino atravesándolo.",
      "Quien no se expone no se encuentra con nadie de verdad.",
      "Esperar condiciones ideales es otra forma de renunciar.",
      "Cada acción tomada debilita el control del miedo.",
      "Actuar imperfectamente es preferible a no actuar perfectamente.",
      "Lo que evitas por miedo suele convertirse en lo que más limita tu vida.",
      "La duda crece en la espera; la claridad aparece en el movimiento.",
      "El primer paso no exige certeza, solo decisión.",
      "Hazlo con miedo si es necesario; lo importante es hacerlo.",
      "La acción reduce el miedo más de lo que la reflexión lo elimina.",
      "Si esperas a no tener miedo, nunca empezarás.",
      "Cada encuentro humano es una posibilidad de cambio, aunque no siempre sea evidente en el momento.",
      "La compañía no rellena el tiempo: es el tiempo.",
      "Quien comprende la finitud deja de aplazar lo esencial.",
      "Nadie recuerda los días perfectamente planificados, sino los momentos plenamente vividos.",
      "El aislamiento prolongado reduce el mundo a lo que ya conoces; la conversación lo expande.",
      "La vida social no es ruido: es descubrimiento.",
      "Vive como si cada día fuese irrepetible, porque lo es.",
      "El tiempo no se guarda; solo se usa o se pierde.",
      "Cada persona que conoces puede ser una puerta hacia algo nuevo si estás dispuesto a abrirla.",
      "Las relaciones humanas son el tejido de la vida; sin ellas, todo pierde sentido.",
      "Sé amable, porque todos los que conoces están librando una gran batalla.",
      "La soledad es peligrosa. Es adictiva.",
      "La gente olvidará lo que dijiste, olvidará lo que hiciste, pero nunca olvidará cómo los hiciste sentir.",
      "Nadie puede cruzar el océano si no tiene el coraje de perder de vista la orilla.",
      "Dentro de veinte años estarás más decepcionado por las cosas que no hiciste que por las que hiciste.",
      "El propósito de la vida es vivirla intensamente.",
      "La amistad duplica las alegrías y divide las angustias por la mitad.",
      "Haz siempre lo que temas hacer.",
      "La vida es demasiado importante para tomársela en serio.",
      "No vayas donde el camino te lleve; ve donde no hay camino y deja un rastro.",
      "La amistad nace cuando alguien dice: “¿Tú también?”",
      "La vida se mide por los momentos que compartimos.",
      "Las mejores historias comienzan con una conversación.",
      "La vida es aquello que sucede mientras haces otros planes.",
      "Cada hombre tiene dos vidas; la segunda comienza al comprender la primera.",
      "Lo que importa no es lo que recibes, sino lo que haces con ello.",
      "Las oportunidades suelen disfrazarse de momentos ordinarios.",
      "Nadie entra en tu vida por accidente.",
      "Recordamos más las conversaciones que nos cambiaron que los días.",
      "No es que tengamos poco tiempo, sino que lo desperdiciamos.",
      "Hay momentos que duran segundos y permanecen toda una vida.",
      "La soledad enseña quién eres; la compañía adecuada te transforma.",
      "Cada persona libra una batalla desconocida.",
      "La vida no espera el instante perfecto, lo crea.",
      "Muchas puertas pequeñas llevan a grandes cambios.",
      "Somos la suma de quienes nos rodean.",
      "Hay encuentros que cambian una vida sin avisar."
    ];

    function getDailyIndex() {
      const today = new Date();
      const seed = today.getFullYear() * 1000 + today.getMonth() * 50 + today.getDate();
      return seed % quotes.length;
    }

    document.getElementById("quote").innerText = quotes[getDailyIndex()];
  </script>
</body>
</html>
